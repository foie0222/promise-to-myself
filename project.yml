name: PromiseToMyself
options:
  bundleIdPrefix: com.daiki-inoue
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.2"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "63AST5A8VY"

targets:
  PromiseToMyself:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PromiseToMyself/Sources
        type: group
    info:
      path: PromiseToMyself/Sources/Info.plist
      properties:
        CFBundleDisplayName: 自分との約束
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: ""
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daiki-inoue.promise-to-myself
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"

  PromiseToMyselfTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PromiseToMyself/Tests
        type: group
    dependencies:
      - target: PromiseToMyself
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daiki-inoue.promise-to-myself.tests
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  PromiseToMyself:
    build:
      targets:
        PromiseToMyself: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PromiseToMyselfTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
